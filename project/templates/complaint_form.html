<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Complaint</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Register Your Complaint</h2>

        <form method="POST" enctype="multipart/form-data">
            <!-- Title -->
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" name="title" placeholder="Brief title for your complaint" required>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" name="category" required>
                    <option value="">Select Category</option>
                    <option value="Garbage">Garbage</option>
                    <option value="Water">Water Supply</option>
                    <option value="Electricity">Electricity</option>
                    <option value="Road">Road/Infrastructure</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="4" placeholder="Describe your issue" required></textarea>
            </div>

            <!-- Location -->
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" name="location" placeholder="Enter location" required>
            </div>

            <!-- Image Upload -->
            <div class="mb-3">
                <label class="form-label">Attach Image (Optional)</label>
                <input type="file" class="form-control" name="image" accept=".jpg,.jpeg,.png">
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit Complaint</button>
            <a href="{{ url_for('citizen_dash') }}" class="btn btn-secondary w-100 mt-2">Back to Dashboard</a>
        </form>
    </div>
</div>
</body>
</html>
